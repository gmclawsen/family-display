<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Family">
<title>Family Board</title>
<style>
  :root{
    --bg:#f4f1ea; --panel:#ffffff; --ink:#2b2b2b; --muted:#8a8378; --line:#e6e1d6;
    --kai:#2f7cc4; --rainier:#3a9d7a; --done:#b9b3a7; --now:#e2604a;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);color:var(--ink);display:flex;flex-direction:column;height:100dvh;overflow:hidden;}
  header{padding:12px 22px;display:flex;align-items:baseline;gap:16px;border-bottom:1px solid var(--line);flex:0 0 auto;}
  .day{font-size:28px;font-weight:800;letter-spacing:.5px;}
  .date{font-size:17px;color:var(--muted);font-weight:600;}
  .status{margin-left:auto;font-size:13px;color:var(--muted);display:flex;align-items:center;gap:10px;}
  .dot{width:9px;height:9px;border-radius:50%;background:#c9c3b6;}
  .dot.ok{background:#4caf50;} .dot.err{background:#e2604a;}
  #signin{display:none;border:0;background:var(--ink);color:#fff;font-weight:700;font-size:13px;padding:7px 14px;border-radius:20px;cursor:pointer;}

  main{flex:1 1 auto;min-height:0;display:flex;gap:12px;padding:12px;}
  .tasks{flex:0 0 44%;min-width:0;display:flex;gap:12px;}
  .col{flex:1;background:var(--panel);border:1px solid var(--line);border-radius:16px;
    display:flex;flex-direction:column;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.04);}
  .col-head{padding:12px 16px;font-size:22px;font-weight:800;color:#fff;display:flex;align-items:center;gap:10px;}
  .col.c0 .col-head{background:var(--kai);} .col.c1 .col-head{background:var(--rainier);}
  .col.c2 .col-head{background:#c58a2f;} .col.c3 .col-head{background:#8a5ac5;}
  .col-head .count{margin-left:auto;font-size:15px;font-weight:700;opacity:.9;}
  .list{list-style:none;margin:0;padding:8px;overflow-y:auto;flex:1;-webkit-overflow-scrolling:touch;}
  .task{display:flex;align-items:center;gap:14px;padding:13px 12px;margin:4px 2px;border-radius:12px;
    font-size:19px;font-weight:600;user-select:none;cursor:pointer;transition:background .12s;min-height:54px;}
  .task:active{background:#f6f3ec;}
  .box{flex:0 0 auto;width:28px;height:28px;border-radius:9px;border:2.5px solid var(--line);display:flex;align-items:center;justify-content:center;transition:all .12s;}
  .col.c0 .task.done .box{background:var(--kai);border-color:var(--kai);}
  .col.c1 .task.done .box{background:var(--rainier);border-color:var(--rainier);}
  .col.c2 .task.done .box{background:#c58a2f;border-color:#c58a2f;}
  .col.c3 .task.done .box{background:#8a5ac5;border-color:#8a5ac5;}
  .box svg{width:17px;height:17px;stroke:#fff;stroke-width:3.5;fill:none;stroke-linecap:round;stroke-linejoin:round;opacity:0;transition:opacity .12s;}
  .task.done .box svg{opacity:1;}
  .label{flex:1;transition:color .15s;}
  .task.done .label{color:var(--done);text-decoration:line-through;text-decoration-thickness:2px;}
  .msg{color:var(--muted);font-size:14px;padding:16px;text-align:center;line-height:1.5;}

  /* ---- Day-view calendar ---- */
  .cal-wrap{flex:1 1 56%;min-width:0;}
  .cal-card{height:100%;background:var(--panel);border:1px solid var(--line);border-radius:16px;
    overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.04);display:flex;flex-direction:column;}
  .cal-head{padding:10px 16px;font-weight:800;font-size:16px;display:flex;justify-content:space-between;
    align-items:center;border-bottom:1px solid var(--line);}
  .cal-head .sub{color:var(--muted);font-weight:600;font-size:14px;}
  .allday{display:flex;flex-wrap:wrap;gap:6px;padding:8px 12px;border-bottom:1px solid var(--line);}
  .allday .chip{font-size:12px;font-weight:700;padding:3px 9px;border-radius:7px;}
  .grid-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
  .grid{position:relative;margin:6px 0;}
  .hourrow{position:absolute;left:0;right:0;height:0;border-top:1px solid var(--line);}
  .hourlabel{position:absolute;left:0;top:-8px;width:50px;text-align:right;padding-right:8px;font-size:11px;color:var(--muted);}
  .events-layer{position:absolute;left:58px;right:10px;top:0;bottom:0;}
  .ev-block{position:absolute;border-radius:8px;padding:3px 8px;font-size:13px;font-weight:700;overflow:hidden;
    box-shadow:0 1px 2px rgba(0,0,0,.12);line-height:1.2;}
  .ev-block .t{font-size:11px;font-weight:600;opacity:.9;}
  .nowline{position:absolute;left:58px;right:10px;height:2px;background:var(--now);z-index:5;}
  .nowline::before{content:"";position:absolute;left:-6px;top:-4px;width:9px;height:9px;border-radius:50%;background:var(--now);}
  .cal-empty{position:absolute;left:0;right:0;top:40px;text-align:center;color:var(--muted);font-size:14px;}

  footer{flex:0 0 auto;text-align:center;font-size:12px;color:var(--muted);padding:0 0 7px;}

  @media (orientation:portrait){ main{flex-direction:column;} .tasks{flex-basis:42%;order:2;} .cal-wrap{order:1;} }
</style>
</head>
<body>
  <header>
    <div class="day" id="dayName">—</div>
    <div class="date" id="dateStr">—</div>
    <div class="status">
      <button id="signin">Sign in</button>
      <span class="dot" id="dot"></span><span id="statusText">Starting…</span>
    </div>
  </header>

  <main>
    <div class="tasks" id="tasks"></div>
    <div class="cal-wrap"><div class="cal-card" id="calCard"></div></div>
  </main>

  <footer id="foot">Family Board</footer>

<script>
/* =========================================================================
   ▼▼▼  EDIT THIS SECTION  ▼▼▼
   ========================================================================= */

/* OAuth Client ID from Google Cloud Console */
const CLIENT_ID = "85621539975-3836ppjvpt9pnjj7dtnq6em0ruav8vsq.apps.googleusercontent.com";

/* Family calendar. Leave "primary" to show every calendar the signed-in
   family account can see (matches what Google Calendar shows). Or set a
   specific calendar id/email to show only that one. */
const CALENDAR_SRC = "primary";

/* Task columns — each maps to a Google Tasks list by its exact NAME. */
const COLUMNS = [
  { title: "Kai",     list: "Kai" },
  { title: "Rainier", list: "Rainier" },
];

/* Default visible window (8 AM–8 PM). The grid auto-expands for events
   outside this range; you just scroll up/down to reach them. */
const DAY_START_HOUR = 8;
const DAY_END_HOUR   = 20;

/* =========================================================================
   ▲▲▲  END EDIT SECTION  ▲▲▲
   ========================================================================= */

const SCOPE = "https://www.googleapis.com/auth/tasks https://www.googleapis.com/auth/calendar.readonly";
const TASKS_API = "https://tasks.googleapis.com/tasks/v1";
const CAL_API = "https://www.googleapis.com/calendar/v3";
let HH = 54; // pixels per hour — recomputed each render so the default window fills the panel

let tokenClient=null, accessToken=null, tokenExpiry=0;

/* ---------- Header / status ---------- */
function renderHeader(){
  const d=new Date();
  document.getElementById("dayName").textContent=d.toLocaleDateString(undefined,{weekday:"long"});
  document.getElementById("dateStr").textContent=d.toLocaleDateString(undefined,{month:"long",day:"numeric"});
}
function setStatus(text,cls){
  document.getElementById("statusText").textContent=text;
  document.getElementById("dot").className="dot"+(cls?(" "+cls):"");
}
function esc(s){return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}

/* ---------- Auth ---------- */
function onGisLoaded(){
  if(!CLIENT_ID){
    setStatus("Add CLIENT_ID in the file","err");
    document.getElementById("tasks").innerHTML='<div class="msg">Paste your OAuth CLIENT_ID near the top of the file.</div>';
    return;
  }
  tokenClient=google.accounts.oauth2.initTokenClient({
    client_id:CLIENT_ID, scope:SCOPE,
    callback:(resp)=>{
      if(resp && resp.access_token){
        accessToken=resp.access_token;
        tokenExpiry=Date.now()+((resp.expires_in?resp.expires_in:3600)*1000)-90000;
        document.getElementById("signin").style.display="none";
        setStatus("Connected","ok");
        afterAuth();
      }else{ showSignIn("Sign-in needed"); }
    },
    error_callback:()=>showSignIn("Tap Sign in")
  });
  requestToken(true);
}
function requestToken(silent){
  if(!tokenClient) return;
  try{ tokenClient.requestAccessToken(silent?{prompt:""}:{prompt:"consent"}); }
  catch(e){ showSignIn("Tap Sign in"); }
}
function showSignIn(text){
  setStatus(text||"Sign in","err");
  const b=document.getElementById("signin");
  b.style.display="inline-block";
  b.onclick=()=>requestToken(false);
}
async function ensureToken(){ if(!accessToken || Date.now()>tokenExpiry) requestToken(true); }

async function gfetch(url,opts){
  const r=await fetch(url,Object.assign({},opts,{
    headers:Object.assign({"Authorization":"Bearer "+accessToken,"Content-Type":"application/json"},(opts&&opts.headers)||{})
  }));
  if(r.status===401){ accessToken=null; requestToken(true); throw new Error("401"); }
  if(!r.ok) throw new Error("http "+r.status);
  return r.status===204?null:r.json();
}

function afterAuth(){ loadTasks(); loadCalendar(); }

/* ================= TASKS ================= */
const CHECK='<svg viewBox="0 0 24 24"><polyline points="4 12 10 18 20 6"></polyline></svg>';

async function loadTasks(){
  if(!accessToken){ requestToken(true); return; }
  try{
    const lists=(await gfetch(TASKS_API+"/users/@me/lists")).items||[];
    const map={}; lists.forEach(l=>{ map[l.title.trim().toLowerCase()]=l.id; });
    const cols=[];
    for(const c of COLUMNS){
      const id=map[(c.list||"").trim().toLowerCase()];
      let items=[];
      if(id){
        const data=await gfetch(TASKS_API+"/lists/"+id+"/tasks?showCompleted=true&showHidden=true&maxResults=100");
        items=(data.items||[]).filter(t=>!t.parent).sort((a,b)=>(a.position||"").localeCompare(b.position||""));
      }
      cols.push({title:c.title,listName:c.list,listId:id,items:items});
    }
    renderTasks(cols);
    setStatus("Updated "+new Date().toLocaleTimeString(undefined,{hour:"numeric",minute:"2-digit"}),"ok");
  }catch(e){ if(String(e.message)!=="401") setStatus("Sync error — retrying","err"); }
}
function renderTasks(cols){
  const root=document.getElementById("tasks"); root.innerHTML="";
  cols.forEach((col,ci)=>{
    const el=document.createElement("div"); el.className="col c"+(ci%4);
    const head=document.createElement("div"); head.className="col-head";
    const done=col.items.filter(t=>t.status==="completed").length;
    head.innerHTML='<span>'+esc(col.title)+'</span><span class="count">'+(col.listId?done+"/"+col.items.length:"")+'</span>';
    el.appendChild(head);
    const ul=document.createElement("ul"); ul.className="list";
    if(!col.listId){ ul.innerHTML='<li class="msg">No Google Tasks list named "'+esc(col.listName)+'".</li>'; }
    else if(col.items.length===0){ ul.innerHTML='<li class="msg">No tasks in this list.</li>'; }
    else{
      col.items.forEach(task=>{
        const li=document.createElement("li");
        li.className="task"+(task.status==="completed"?" done":"");
        li.innerHTML='<span class="box">'+CHECK+'</span><span class="label">'+esc(task.title||"(untitled)")+'</span>';
        li.addEventListener("click",()=>toggle(col.listId,task,li,head));
        ul.appendChild(li);
      });
    }
    el.appendChild(ul); root.appendChild(el);
  });
}
async function toggle(listId,task,li,head){
  const completing=task.status!=="completed";
  li.classList.toggle("done",completing);
  try{
    await ensureToken();
    await gfetch(TASKS_API+"/lists/"+listId+"/tasks/"+task.id,{method:"PATCH",
      body:JSON.stringify(completing?{status:"completed"}:{status:"needsAction"})});
    task.status=completing?"completed":"needsAction";
    const c=head.querySelector(".count");
    if(c && c.textContent.indexOf("/")>-1){
      const ul=li.closest(".list");
      c.textContent=ul.querySelectorAll(".task.done").length+"/"+ul.querySelectorAll(".task").length;
    }
  }catch(e){ li.classList.toggle("done",!completing); setStatus("Couldn't save — check connection","err"); }
}

/* ================= CALENDAR (custom day view) ================= */
function txt(hex){ // choose black/white text for a background hex
  if(!hex) return "#fff";
  const h=hex.replace("#",""); if(h.length<6) return "#fff";
  const r=parseInt(h.substr(0,2),16),g=parseInt(h.substr(2,2),16),b=parseInt(h.substr(4,2),16);
  return (0.299*r+0.587*g+0.114*b)>150 ? "#1f1f1f" : "#ffffff";
}
function minutesOf(dt){ const d=new Date(dt); return d.getHours()*60+d.getMinutes(); }
function fmtHour(h){ const ap=h<12?"AM":"PM"; let hh=h%12; if(hh===0)hh=12; return hh+" "+ap; }
function fmtMin(m){ let h=Math.floor(m/60),mm=m%60; const ap=h<12?"AM":"PM"; let hh=h%12; if(hh===0)hh=12;
  return hh+(mm?(":"+String(mm).padStart(2,"0")):"")+" "+ap; }

function layoutColumns(evs){
  const s=evs.slice().sort((a,b)=>a.start-b.start||a.end-b.end);
  let cluster=[],curEnd=-1;
  const flush=()=>{ if(!cluster.length)return; const colsEnd=[];
    cluster.forEach(ev=>{ let placed=false;
      for(let i=0;i<colsEnd.length;i++){ if(ev.start>=colsEnd[i]){ ev.col=i; colsEnd[i]=ev.end; placed=true; break; } }
      if(!placed){ ev.col=colsEnd.length; colsEnd.push(ev.end); } });
    cluster.forEach(ev=>ev.ncols=colsEnd.length); cluster=[]; curEnd=-1; };
  s.forEach(ev=>{ if(cluster.length && ev.start>=curEnd) flush(); cluster.push(ev); curEnd=Math.max(curEnd,ev.end); });
  flush();
}

async function loadCalendar(){
  if(!accessToken) return;
  const now=new Date();
  const s=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  const e=new Date(now.getFullYear(),now.getMonth(),now.getDate()+1);
  let cals=[];
  if(CALENDAR_SRC && CALENDAR_SRC!=="primary"){
    cals=[{id:CALENDAR_SRC,backgroundColor:"#2f7cc4"}];
  }else{
    try{ const cl=await gfetch(CAL_API+"/users/me/calendarList");
      cals=(cl.items||[]).filter(c=>c.selected!==false).map(c=>({id:c.id,backgroundColor:c.backgroundColor||"#3a7bd5"}));
    }catch(err){ cals=[{id:"primary",backgroundColor:"#2f7cc4"}]; }
  }
  let events=[];
  for(const c of cals){
    try{
      const u=CAL_API+"/calendars/"+encodeURIComponent(c.id)+"/events?singleEvents=true&orderBy=startTime&maxResults=50"+
        "&timeMin="+encodeURIComponent(s.toISOString())+"&timeMax="+encodeURIComponent(e.toISOString());
      const data=await gfetch(u);
      (data.items||[]).forEach(ev=>{ ev._color=ev.colorId?c.backgroundColor:c.backgroundColor; events.push(ev); });
    }catch(err){}
  }
  renderDay(events);
}

function renderDay(events){
  const timed=[], allday=[];
  events.forEach(ev=>{
    if(ev.start && ev.start.dateTime){
      const st=minutesOf(ev.start.dateTime);
      let en=ev.end&&ev.end.dateTime?minutesOf(ev.end.dateTime):st+30;
      if(en<=st) en=st+30;
      timed.push({title:ev.summary||"(busy)",start:st,end:en,color:ev._color||"#2f7cc4"});
    }else if(ev.start && ev.start.date){
      allday.push({title:ev.summary||"(all day)",color:ev._color||"#2f7cc4"});
    }
  });
  // Size each hour so the default window (DAY_START_HOUR–DAY_END_HOUR) fills the panel.
  const cardH=(document.getElementById("calCard").clientHeight)||600;
  const availH=Math.max(420, cardH-46-(allday.length?44:0)-14);
  HH=Math.max(40, availH/(DAY_END_HOUR-DAY_START_HOUR));

  let minS=DAY_START_HOUR*60, maxE=DAY_END_HOUR*60;
  timed.forEach(t=>{ minS=Math.min(minS,t.start); maxE=Math.max(maxE,t.end); });
  const startH=Math.max(0,Math.floor(minS/60));
  let endH=Math.min(24,Math.ceil(maxE/60)); if(endH<=startH) endH=startH+1;
  layoutColumns(timed);

  let h='<div class="cal-head"><span>Today</span><span class="sub">'+
    new Date().toLocaleDateString(undefined,{weekday:"short",month:"short",day:"numeric"})+'</span></div>';
  if(allday.length){
    h+='<div class="allday">'+allday.map(a=>'<span class="chip" style="background:'+a.color+';color:'+txt(a.color)+'">'+esc(a.title)+'</span>').join('')+'</div>';
  }
  h+='<div class="grid-scroll" id="gridScroll"><div class="grid" style="height:'+((endH-startH)*HH)+'px">';
  for(let hr=startH;hr<=endH;hr++){
    h+='<div class="hourrow" style="top:'+((hr-startH)*HH)+'px"><span class="hourlabel">'+fmtHour(hr%24)+'</span></div>';
  }
  h+='<div class="events-layer">';
  timed.forEach(t=>{
    const top=((t.start-startH*60)/60)*HH;
    const height=Math.max(20,((t.end-t.start)/60)*HH-2);
    const w=100/(t.ncols||1), left=(t.col||0)*w;
    h+='<div class="ev-block" style="top:'+top+'px;height:'+height+'px;left:'+left+'%;width:calc('+w+'% - 3px);'+
       'background:'+t.color+';color:'+txt(t.color)+'"><div class="t">'+fmtMin(t.start)+'</div>'+esc(t.title)+'</div>';
  });
  h+='</div>';
  if(timed.length===0 && allday.length===0) h+='<div class="cal-empty">No events today</div>';
  h+='<div class="nowline" id="nowline" style="display:none"></div>';
  h+='</div></div>';

  const card=document.getElementById("calCard");
  card.innerHTML=h;
  card._range={startH,endH};
  positionNow();
  const gs=document.getElementById("gridScroll");
  if(gs){ const target=(DAY_START_HOUR-startH)*HH; gs.scrollTop=Math.max(0,target); }
}

function positionNow(){
  const card=document.getElementById("calCard"); if(!card||!card._range) return;
  const line=document.getElementById("nowline"); if(!line) return;
  const {startH,endH}=card._range;
  const now=new Date(); const m=now.getHours()*60+now.getMinutes();
  if(m< startH*60 || m> endH*60){ line.style.display="none"; return; }
  line.style.display="block";
  line.style.top=(((m-startH*60)/60)*HH)+"px";
}

/* ---------- Timers ---------- */
function scheduleMidnight(){
  const now=new Date(); const next=new Date(now.getFullYear(),now.getMonth(),now.getDate()+1,0,0,5);
  setTimeout(()=>location.reload(), next-now);
}
renderHeader();
document.getElementById("calCard").innerHTML='<div class="msg" style="margin:auto">Connecting…</div>';
scheduleMidnight();
setInterval(()=>{ if(accessToken){ loadTasks(); loadCalendar(); } }, 3*60*1000);
setInterval(positionNow, 60*1000);
setInterval(()=>{ if(tokenClient) requestToken(true); }, 50*60*1000);
document.addEventListener("visibilitychange",()=>{ if(!document.hidden){ renderHeader(); if(accessToken) afterAuth(); } });
</script>
<script src="https://accounts.google.com/gsi/client" onload="onGisLoaded()" async defer></script>
</body>
</html>
